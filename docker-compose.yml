services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: kagoshima_travel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  postgres_data:
