name: reviewdog

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: reviewdog-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  actionlint:
    name: reviewdog actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Review GitHub Actions workflows
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: diff_context
          fail_level: error

  staticcheck:
    name: reviewdog staticcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Review Go code with staticcheck
        uses: reviewdog/action-staticcheck@564f18c6297af36f7b10b6c7a72e814341bd813a
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workdir: backend
          reporter: github-pr-review
          filter_mode: diff_context
          fail_level: error
