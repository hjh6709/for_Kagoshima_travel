name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend:
    name: backend test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Run Go tests
        run: go test ./...

      - name: Run Go race tests
        run: go test -race ./...

      - name: Check go mod tidy drift
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  backend-postgres:
    name: backend postgres test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: kagoshima_travel
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kagoshima_travel"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Apply PostgreSQL schema
        run: |
          docker cp schema.sql "${{ job.services.postgres.id }}:/tmp/schema.sql"
          docker exec "${{ job.services.postgres.id }}" psql -U postgres -d kagoshima_travel -f /tmp/schema.sql

      - name: Run Go tests with PostgreSQL
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/kagoshima_travel?sslmode=disable
          JWT_SECRET: test-secret
        run: go test ./... -count=1

  pr-check-doctor:
    name: pr check doctor
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
      - backend-postgres
    if: ${{ always() && github.event_name == 'pull_request' }}
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      # pr-check-doctor v0.1.2 pinned to an immutable commit for CodeQL.
      - uses: hjh6709/pr-check-doctor@94e04c08d97a857c1a26c76cdb523fb90ecace29
        with:
          github-token: ${{ github.token }}
